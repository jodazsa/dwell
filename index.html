<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dwell • Hobonichi Spread</title>
  <style>
    :root {
      --paper: #fbfaf6;
      --paper-warm: #f5f2ea;
      --ink: #3f3b36;
      --line: #8f8a82;
      --grid: rgba(136, 130, 120, 0.25);
      --sunday: #d04d3e;
      --shadow: rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, #2d3442 0%, #1f2530 50%, #171b24 100%);
      font-family: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
      color: var(--ink);
      padding: 28px;
    }

    .notebook {
      width: min(1240px, 100%);
      aspect-ratio: 16 / 10;
      border-radius: 10px;
      padding: 24px 26px;
      background: linear-gradient(160deg, #fefcf8 0%, #f8f5ee 100%);
      box-shadow:
        0 16px 38px var(--shadow),
        inset 0 0 0 1px rgba(80, 72, 60, 0.15);
      position: relative;
      overflow: hidden;
    }

    .notebook::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(120, 110, 98, 0.015) 0,
          rgba(120, 110, 98, 0.015) 2px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.7;
    }

    .spread {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      background: var(--paper);
      border: 1px solid rgba(70, 64, 58, 0.18);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .page {
      position: relative;
      padding: 18px 14px 14px;
      background:
        radial-gradient(circle at 60% 30%, rgba(255, 255, 255, 0.95) 0%, rgba(252, 249, 242, 0.96) 65%, var(--paper-warm) 100%);
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 10px;
    }

    .page-right {
      grid-template-columns: 1fr;
      padding-left: 10px;
    }

    .gutter {
      background: linear-gradient(to right, rgba(180, 172, 162, 0.25), rgba(240, 235, 225, 0.6), rgba(180, 172, 162, 0.25));
      box-shadow: inset 0 0 8px rgba(0,0,0,0.08);
    }

    .month-panel {
      padding: 4px 6px 0;
      border-right: 1px solid rgba(122, 116, 108, 0.24);
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .month-number {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      font-weight: 400;
    }

    .month-name {
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      font-weight: 300;
    }

    .month-year {
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: rgba(65, 59, 52, 0.75);
    }

    .calendar {
      height: 100%;
      display: grid;
      grid-template-rows: 30px repeat(6, 1fr);
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle, rgba(138, 132, 124, 0.22) 1px, transparent 1.5px) 0 0 / 12px 12px;
    }

    .calendar::before {
      content: "";
      position: absolute;
      inset: 0;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      pointer-events: none;
      z-index: 2;
    }

    .dow, .cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 4px 6px;
      position: relative;
      z-index: 1;
    }

    .dow {
      background: rgba(245, 242, 233, 0.72);
      text-align: left;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dow.sunday,
    .date.sunday {
      color: var(--sunday);
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      min-height: 0;
    }

    .cell {
      min-height: 0;
      background: rgba(255, 255, 255, 0.32);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .date {
      font-size: 1.55rem;
      line-height: 1;
      font-weight: 300;
      color: rgba(47, 42, 36, 0.92);
    }

    .date.muted {
      color: rgba(129, 121, 111, 0.48);
    }

    @media (max-width: 980px) {
      .notebook {
        aspect-ratio: auto;
        padding: 14px;
      }

      .spread {
        grid-template-columns: 1fr;
      }

      .gutter {
        display: none;
      }

      .page,
      .page-right {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .month-panel {
        border-right: none;
        border-bottom: 1px solid rgba(122, 116, 108, 0.24);
        padding-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="notebook" aria-label="Hobonichi style monthly spread">
    <section class="spread">
      <article class="page">
        <aside class="month-panel">
          <div class="month-number" id="monthNumber">6</div>
          <div class="month-name" id="monthName">June</div>
          <div class="month-year" id="monthYear">2026</div>
        </aside>

        <div class="calendar" id="leftCalendar"></div>
      </article>

      <div class="gutter" aria-hidden="true"></div>

      <article class="page page-right">
        <div class="calendar" id="rightCalendar"></div>
      </article>
    </section>
  </main>

  <script>
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    function startOfGrid(year, month) {
      const first = new Date(year, month, 1);
      const day = (first.getDay() + 6) % 7;
      const start = new Date(first);
      start.setDate(first.getDate() - day);
      return start;
    }

    function buildMonth(year, month) {
      const start = startOfGrid(year, month);
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        cells.push(d);
      }
      return cells;
    }

    function renderHalf(el, cells, offsetWeeks) {
      const header = document.createElement("div");
      header.className = "week";

      DAYS.forEach((day, index) => {
        const dow = document.createElement("div");
        dow.className = `dow ${index === 6 ? "sunday" : ""}`;
        dow.textContent = day;
        header.appendChild(dow);
      });

      el.appendChild(header);

      for (let week = offsetWeeks; week < offsetWeeks + 3; week++) {
        const weekRow = document.createElement("div");
        weekRow.className = "week";

        for (let day = 0; day < 7; day++) {
          const idx = week * 7 + day;
          const cellDate = cells[idx];
          const cell = document.createElement("div");
          cell.className = "cell";

          const date = document.createElement("span");
          const isSunday = day === 6;
          const isOtherMonth = cellDate.getMonth() !== cells[20].getMonth();
          date.className = `date ${isSunday ? "sunday" : ""} ${isOtherMonth ? "muted" : ""}`.trim();
          date.textContent = cellDate.getDate();

          cell.appendChild(date);
          weekRow.appendChild(cell);
        }

        el.appendChild(weekRow);
      }
    }

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const monthLabel = new Date(year, month, 1).toLocaleString("en-US", { month: "long" });
    document.getElementById("monthNumber").textContent = month + 1;
    document.getElementById("monthName").textContent = monthLabel;
    document.getElementById("monthYear").textContent = year;

    const cells = buildMonth(year, month);
    renderHalf(document.getElementById("leftCalendar"), cells, 0);
    renderHalf(document.getElementById("rightCalendar"), cells, 3);
  </script>
</body>
</html>
