<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dwell • Minimal Focus Column</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --line: #dfdfdb;
      --text: #252523;
      --muted: #6e6e69;
      --accent: #303038;
      --accent-soft: #ececf2;
      --radius: 10px;
      --gap: 10px;
      --font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    .shell {
      width: min(100%, 360px);
      margin: 0 auto;
      padding: 10px;
      display: grid;
      gap: var(--gap);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .panel h2 {
      margin: 0;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .timer-main {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .timer-value {
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .timer-mode {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-top: 4px;
    }

    .timer-session {
      font-size: 0.68rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button, input, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 7px 9px;
      cursor: pointer;
      font-size: 0.78rem;
    }

    button:hover { border-color: #b7b7b0; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .preset {
      background: var(--accent-soft);
      border-color: #d7d7e6;
      font-size: 0.72rem;
      padding: 6px 8px;
    }

    .tracker-form,
    .thought-form {
      display: grid;
      gap: 6px;
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      background: #fff;
      outline: none;
      font-size: 0.8rem;
    }

    textarea {
      min-height: 58px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #a9a9b7;
    }

    .help,
    .error {
      margin: 0;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .error {
      color: #8d3030;
      min-height: 1em;
    }

    .tracker-list,
    .thought-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .tracker-card,
    .thought-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: #fbfbfa;
      display: grid;
      gap: 6px;
    }

    .tracker-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .tracker-name {
      font-size: 0.78rem;
      font-weight: 600;
    }

    .tracker-range {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .tracker-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 4px;
    }

    .cell {
      border: 1px solid #d2d2ce;
      border-radius: 6px;
      background: #fff;
      font-size: 0.65rem;
      line-height: 1;
      padding: 6px 0;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .cell.is-on {
      background: #3a3a45;
      border-color: #3a3a45;
      color: #fff;
    }

    .thought-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.66rem;
      color: var(--muted);
    }

    .thought-body {
      font-size: 0.78rem;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel" aria-labelledby="pomodoroTitle">
      <h2 id="pomodoroTitle">Pomodoro</h2>
      <div class="timer-main">
        <div>
          <div id="timeDisplay" class="timer-value">25:00</div>
          <div id="modeDisplay" class="timer-mode">Focus</div>
        </div>
        <div id="sessionDisplay" class="timer-session">S1</div>
      </div>
      <div class="row">
        <button id="startBtn" class="btn-primary" type="button">Start</button>
        <button id="pauseBtn" type="button">Pause</button>
        <button id="resetBtn" type="button">Reset</button>
        <button id="skipBtn" type="button">Skip</button>
      </div>
      <div class="row">
        <button class="preset" type="button" data-focus="25" data-break="5">25 / 5</button>
        <button class="preset" type="button" data-focus="45" data-break="10">45 / 10</button>
        <button class="preset" type="button" data-focus="52" data-break="17">52 / 17</button>
      </div>
    </section>

    <section class="panel" aria-labelledby="trackerTitle">
      <h2 id="trackerTitle">Grid Tracker</h2>
      <form id="trackerForm" class="tracker-form">
        <input id="trackerName" type="text" placeholder="Tracker name" maxlength="40" required />
        <div class="inline">
          <input id="trackerStart" type="number" placeholder="Start" required />
          <input id="trackerEnd" type="number" placeholder="End" required />
        </div>
        <button type="submit">Add Tracker</button>
        <p id="trackerError" class="error"></p>
      </form>
      <p class="help">Tap numbers to mark/unmark progress.</p>
      <div id="trackerList" class="tracker-list"></div>
    </section>

    <section class="panel" aria-labelledby="thoughtTitle">
      <h2 id="thoughtTitle">Thought Log</h2>
      <form id="thoughtForm" class="thought-form">
        <textarea id="thoughtBody" placeholder="Capture a quick thought..." required></textarea>
        <div class="row">
          <button class="btn-primary" type="submit">Save</button>
          <button id="clearThoughtsBtn" type="button">Clear</button>
        </div>
      </form>
      <div id="thoughtList" class="thought-list"></div>
    </section>
  </main>

  <script>
    const $ = (selector) => document.querySelector(selector);

    const KEYS = {
      timer: 'dwell.min.timer.v1',
      trackers: 'dwell.min.trackers.v1',
      thoughts: 'dwell.min.thoughts.v1',
    };

    const state = {
      timer: {
        focusMinutes: 25,
        breakMinutes: 5,
        mode: 'focus',
        session: 1,
        running: false,
        intervalId: null,
        totalSeconds: 25 * 60,
        remainingSeconds: 25 * 60,
      },
      trackers: [],
      thoughts: [],
    };

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = (seconds % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function syncTimerUi() {
      const t = state.timer;
      $('#timeDisplay').textContent = formatTime(t.remainingSeconds);
      $('#modeDisplay').textContent = t.mode === 'focus' ? 'Focus' : 'Break';
      $('#sessionDisplay').textContent = `S${t.session}`;
    }

    function persistTimer() {
      const t = state.timer;
      localStorage.setItem(KEYS.timer, JSON.stringify({
        focusMinutes: t.focusMinutes,
        breakMinutes: t.breakMinutes,
        mode: t.mode,
        session: t.session,
        totalSeconds: t.totalSeconds,
        remainingSeconds: t.remainingSeconds,
      }));
    }

    function loadTimer() {
      const raw = localStorage.getItem(KEYS.timer);
      if (!raw) return;
      try {
        const saved = JSON.parse(raw);
        state.timer.focusMinutes = Number(saved.focusMinutes) || 25;
        state.timer.breakMinutes = Number(saved.breakMinutes) || 5;
        state.timer.mode = saved.mode === 'break' ? 'break' : 'focus';
        state.timer.session = Number(saved.session) > 0 ? Number(saved.session) : 1;
        state.timer.totalSeconds = Number(saved.totalSeconds) || (state.timer.focusMinutes * 60);
        state.timer.remainingSeconds = Number(saved.remainingSeconds) || state.timer.totalSeconds;
      } catch {
        // Ignore malformed local data.
      }
    }

    function moveToMode(nextMode, countSessionAdvance = true) {
      const t = state.timer;
      t.mode = nextMode;
      if (nextMode === 'focus') {
        if (countSessionAdvance) t.session += 1;
        t.totalSeconds = t.focusMinutes * 60;
      } else {
        t.totalSeconds = t.breakMinutes * 60;
      }
      t.remainingSeconds = t.totalSeconds;
      syncTimerUi();
      persistTimer();
    }

    function tickTimer() {
      const t = state.timer;
      if (t.remainingSeconds > 0) {
        t.remainingSeconds -= 1;
        syncTimerUi();
        persistTimer();
        return;
      }

      if (t.mode === 'focus') {
        moveToMode('break', true);
      } else {
        moveToMode('focus', true);
      }
    }

    function startTimer() {
      const t = state.timer;
      if (t.running) return;
      t.running = true;
      t.intervalId = setInterval(tickTimer, 1000);
    }

    function pauseTimer() {
      const t = state.timer;
      if (!t.running) return;
      t.running = false;
      clearInterval(t.intervalId);
      t.intervalId = null;
    }

    function resetTimer() {
      const t = state.timer;
      pauseTimer();
      t.totalSeconds = (t.mode === 'focus' ? t.focusMinutes : t.breakMinutes) * 60;
      t.remainingSeconds = t.totalSeconds;
      syncTimerUi();
      persistTimer();
    }

    function skipTimer() {
      pauseTimer();
      if (state.timer.mode === 'focus') {
        moveToMode('break', false);
      } else {
        moveToMode('focus', true);
      }
    }

    function applyPreset(focus, breakMinutes) {
      pauseTimer();
      const t = state.timer;
      t.focusMinutes = focus;
      t.breakMinutes = breakMinutes;
      t.mode = 'focus';
      t.totalSeconds = focus * 60;
      t.remainingSeconds = t.totalSeconds;
      syncTimerUi();
      persistTimer();
    }

    function persistTrackers() {
      localStorage.setItem(KEYS.trackers, JSON.stringify(state.trackers));
    }

    function loadTrackers() {
      const raw = localStorage.getItem(KEYS.trackers);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) state.trackers = parsed;
      } catch {
        // Ignore malformed local data.
      }
    }

    function validateTrackerInput(name, start, end) {
      if (!name.trim()) return 'Name is required.';
      if (!Number.isInteger(start) || !Number.isInteger(end)) return 'Start and end must be whole numbers.';
      if (end < start) return 'End must be greater than or equal to start.';
      if (end - start > 160) return 'Range is too large for narrow mode.';
      return '';
    }

    function trackerProgress(tracker) {
      const total = tracker.end - tracker.start + 1;
      return `${tracker.completed.length}/${total}`;
    }

    function toggleTrackerValue(id, value) {
      const tracker = state.trackers.find((item) => item.id === id);
      if (!tracker) return;
      const index = tracker.completed.indexOf(value);
      if (index >= 0) tracker.completed.splice(index, 1);
      else tracker.completed.push(value);
      tracker.completed.sort((a, b) => a - b);
      persistTrackers();
      renderTrackers();
    }

    function renderTrackers() {
      const root = $('#trackerList');
      root.innerHTML = '';

      if (!state.trackers.length) {
        const empty = document.createElement('div');
        empty.className = 'tracker-card';
        empty.textContent = 'No trackers yet.';
        root.appendChild(empty);
        return;
      }

      state.trackers.forEach((tracker) => {
        const card = document.createElement('article');
        card.className = 'tracker-card';

        const head = document.createElement('div');
        head.className = 'tracker-head';
        head.innerHTML = `
          <div class="tracker-name">${escapeHtml(tracker.name)}</div>
          <div class="tracker-range">${trackerProgress(tracker)}</div>
        `;

        const grid = document.createElement('div');
        grid.className = 'tracker-grid';

        for (let value = tracker.start; value <= tracker.end; value += 1) {
          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = `cell${tracker.completed.includes(value) ? ' is-on' : ''}`;
          cell.textContent = value;
          cell.setAttribute('data-id', tracker.id);
          cell.setAttribute('data-value', value);
          grid.appendChild(cell);
        }

        card.append(head, grid);
        root.appendChild(card);
      });
    }

    function persistThoughts() {
      localStorage.setItem(KEYS.thoughts, JSON.stringify(state.thoughts));
    }

    function loadThoughts() {
      const raw = localStorage.getItem(KEYS.thoughts);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) state.thoughts = parsed;
      } catch {
        // Ignore malformed local data.
      }
    }

    function renderThoughts() {
      const root = $('#thoughtList');
      root.innerHTML = '';

      if (!state.thoughts.length) {
        const empty = document.createElement('div');
        empty.className = 'thought-card';
        empty.textContent = 'No thoughts logged yet.';
        root.appendChild(empty);
        return;
      }

      state.thoughts.forEach((entry) => {
        const card = document.createElement('article');
        card.className = 'thought-card';
        card.innerHTML = `
          <div class="thought-meta">
            <span>${escapeHtml(entry.tag)}</span>
            <span>${escapeHtml(entry.time)}</span>
          </div>
          <div class="thought-body">${escapeHtml(entry.body)}</div>
        `;
        root.appendChild(card);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function bindEvents() {
      $('#startBtn').addEventListener('click', startTimer);
      $('#pauseBtn').addEventListener('click', pauseTimer);
      $('#resetBtn').addEventListener('click', resetTimer);
      $('#skipBtn').addEventListener('click', skipTimer);

      document.querySelectorAll('[data-focus]').forEach((button) => {
        button.addEventListener('click', () => {
          const focus = Number(button.dataset.focus);
          const breakMinutes = Number(button.dataset.break);
          applyPreset(focus, breakMinutes);
        });
      });

      $('#trackerForm').addEventListener('submit', (event) => {
        event.preventDefault();
        const name = $('#trackerName').value;
        const start = Number($('#trackerStart').value);
        const end = Number($('#trackerEnd').value);
        const error = validateTrackerInput(name, start, end);
        $('#trackerError').textContent = error;
        if (error) return;

        state.trackers.unshift({
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: name.trim(),
          start,
          end,
          completed: [],
        });

        persistTrackers();
        renderTrackers();
        event.target.reset();
      });

      $('#trackerList').addEventListener('click', (event) => {
        const cell = event.target.closest('[data-id][data-value]');
        if (!cell) return;
        toggleTrackerValue(cell.dataset.id, Number(cell.dataset.value));
      });

      $('#thoughtForm').addEventListener('submit', (event) => {
        event.preventDefault();
        const body = $('#thoughtBody').value.trim();
        if (!body) return;

        state.thoughts.unshift({
          body,
          tag: state.timer.mode === 'focus' ? 'FOCUS' : 'BREAK',
          time: new Date().toLocaleString([], {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
          }),
        });

        state.thoughts = state.thoughts.slice(0, 200);
        persistThoughts();
        renderThoughts();
        event.target.reset();
      });

      $('#clearThoughtsBtn').addEventListener('click', () => {
        state.thoughts = [];
        persistThoughts();
        renderThoughts();
      });

      window.addEventListener('beforeunload', pauseTimer);
    }

    function init() {
      loadTimer();
      loadTrackers();
      loadThoughts();
      syncTimerUi();
      renderTrackers();
      renderThoughts();
      bindEvents();
    }

    init();
  </script>
</body>
</html>
